<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ webConfig.ADDON_NAME }} – Addon Stremio pour Anime-Sama</title>
    <meta content="{{ webConfig.ADDON_NAME }}" property="og:title" />
    <meta content="{{ webConfig.ADDON_NAME }} – Addon non officiel pour Stremio" property="og:description" />
    <meta content="#7c3aed" data-react-helmet="true" name="theme-color" />
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/Dyhlio/astream/refs/heads/main/astream/public/astream-logo.jpg">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --secondary: #3b82f6;
            --accent: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --bg-elevated: #262626;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --border: #404040;
            --border-hover: #525252;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.6);
            --gradient-primary: var(--primary);
            --gradient-accent: var(--accent);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===========================
           Navigation
           =========================== */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 2rem;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }

        .nav-menu {
            display: flex;
            gap: 0.5rem;
        }

        .nav-item {
            padding: 8px 16px;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--gradient-primary);
            color: white;
        }

        /* ===========================
           Mise en page principale
           =========================== */
        .main {
            margin-top: 70px;
            min-height: calc(100vh - 70px);
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            padding: 2rem;
        }
        
        .main.with-sidebar {
            grid-template-columns: 1fr 350px;
        }

        .content {
            min-height: calc(100vh - 140px);
        }

        .sidebar {
            position: sticky;
            top: 90px;
            height: fit-content;
        }

        /* ===========================
           Pages
           =========================== */
        .page {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===========================
           Page d'accueil
           =========================== */
        .hero {
            text-align: center;
            padding: 4rem 0;
            background: radial-gradient(ellipse at center, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            border-radius: 24px;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-coffee {
            background: #FFDD00;
            color: #000000;
            font-weight: 600;
            box-shadow: var(--shadow-md);
        }

        .btn-coffee:hover {
            background: #FFE500;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 221, 0, 0.4);
        }

        /* ===========================
           Cartes d'avertissement
           =========================== */
        .warnings {
            display: grid;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .warning-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .warning-card.danger {
            border: 2px solid var(--danger);
            background: rgba(239, 68, 68, 0.05);
        }

        .warning-card.warning {
            border: 2px solid var(--warning);
            background: rgba(245, 158, 11, 0.05);
        }

        .warning-card.info {
            border: 2px solid var(--secondary);
            background: rgba(6, 182, 212, 0.05);
        }

        .warning-icon {
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .warning-content h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .warning-content p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ===========================
           Grille de fonctionnalités
           =========================== */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .feature-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .feature-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .feature-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ===========================
           Page d'informations
           =========================== */
        .info-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .info-section h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .copy-section-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: auto;
            display: flex;
            align-items: center;
            font-size: 0.8rem;
        }
        
        .copy-section-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .info-section h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 1.5rem 0 0.8rem 0;
            color: var(--primary);
        }

        .info-section ul {
            list-style: none;
            margin-left: 0;
        }

        .info-section li {
            margin-bottom: 0.8rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.95rem;
        }

        .info-section li::before {
            content: "•";
            color: var(--primary);
            font-weight: bold;
            margin-top: 2px;
        }

        .content-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .content-table th,
        .content-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .content-table th {
            background: var(--bg-elevated);
            font-weight: 600;
            color: var(--text-primary);
        }

        .content-table td {
            color: var(--text-secondary);
        }

        /* ===========================
           Cartes de problèmes
           =========================== */
        .problem-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
        }

        .problem-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.1);
        }

        .problem-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .problem-card p {
            margin: 0.8rem 0;
            line-height: 1.6;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            color: var(--primary);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .github-link:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .solution-list {
            list-style: none;
            margin: 1rem 0 0 0;
            padding: 0;
        }

        .solution-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 0.8rem;
            padding: 8px 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .solution-list li i {
            color: var(--accent);
            margin-top: 2px;
            flex-shrink: 0;
        }

        /* ===========================
           Grille de contenu
           =========================== */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .content-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .content-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .content-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: white;
            font-size: 1.5rem;
        }

        .content-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: var(--text-primary);
        }

        .season-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0.5rem 0;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
        }

        .content-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0;
        }

        .info-note {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .info-note p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* ===========================
           Groupe radio moderne
           =========================== */
        .modern-radio-group {
            display: grid;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .modern-radio-option {
            position: relative;
        }

        .modern-radio-option input[type="radio"],
        .modern-radio-option input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .modern-radio-label {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-elevated);
        }

        .modern-radio-label:hover {
            border-color: var(--primary);
            background: var(--bg-card);
        }

        .modern-radio-option input[type="radio"]:checked + .modern-radio-label,
        .modern-radio-option input[type="checkbox"]:checked + .modern-radio-label {
            border-color: var(--primary);
            background: rgba(124, 58, 237, 0.05);
        }

        .modern-radio-label.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .modern-radio-option input:disabled + .modern-radio-label {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .radio-icon {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .radio-content {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .radio-content strong {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .radio-content span {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .order-selection h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .order-selection p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        /* ===========================
           Config Sidebar
           =========================== */
        .config-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            position: sticky;
            top: 90px;
        }

        .config-panel h3 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

            gap: 0.8rem;
        }

        .radio-option {
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }
